# Lint + format enforcement for pycats (#492 slice 4/5, ADR-0006): run ruff's lint rules
# and the formatter check on commit.
#
# One-time per-clone setup:   .venv/bin/pre-commit install
# Run manually against all files: .venv/bin/pre-commit run --all-files
#
# ruff-only by design — the hook must stay fast (seconds). The full pytest suite is the
# on-demand source of truth (SDL_VIDEODRIVER=dummy ... pytest -q), too slow for a commit
# hook. Enforcement model is pre-commit + on-demand, NOT a CI gate (there is no CI).
repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (F,I,E722,E702,E402,UP — lint + import-sort + no-bare-except/semicolons/late-imports + pyupgrade)
        entry: .venv/bin/ruff check --select F,I,E722,E702,E402,UP pycats/ tests/ watch.py bench.py bench_render.py conftest.py
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format --check (whole-tree formatter, adopted #525)
        entry: .venv/bin/ruff format --check pycats/ watch.py bench.py bench_render.py conftest.py
        language: system
        pass_filenames: false
        always_run: true
