[pytest]
# Bare `pytest` is the single source of truth: it collects and runs the whole
# suite green (see README "Run tests"). Legacy debug scripts that masqueraded as
# tests were relocated to scripts/ (#59), so there are no collection errors and
# the README file list is now optional convenience, not a requirement.
testpaths = tests
markers =
    slow: long-running benchmark tests (deselect with -m "not slow")
