[pytest]
# The benchmark/statecharts suite lives in tests/test_*.py (see README).
# NOTE: tests/ also contains pre-existing legacy debug scripts (some error at
# import, and 4 zero-byte root stubs share basenames with files here) that are
# unrelated to this work; run the benchmark suite by listing its files (README)
# or select with -k, rather than bare `pytest`, until that debt is cleaned up.
testpaths = tests
markers =
    slow: long-running benchmark tests (deselect with -m "not slow")
